services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: clawith
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: clawith
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clawith"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - clawith_network

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - clawith_network

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    command: ["/bin/bash", "/app/entrypoint.sh"]
    environment:
      DATABASE_URL: postgresql+asyncpg://clawith:${POSTGRES_PASSWORD}@postgres:5432/clawith
      REDIS_URL: redis://redis:6379/0
      AGENT_DATA_DIR: /data/agents
      AGENT_TEMPLATE_DIR: /app/agent_template
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      # Infisical MCP (via Supergateway)
      INFISICAL_HOST_URL: ${INFISICAL_HOST_URL:-}
      INFISICAL_UNIVERSAL_AUTH_CLIENT_ID: ${INFISICAL_UNIVERSAL_AUTH_CLIENT_ID:-}
      INFISICAL_UNIVERSAL_AUTH_CLIENT_SECRET: ${INFISICAL_UNIVERSAL_AUTH_CLIENT_SECRET:-}
      INFISICAL_PROJECT_ID: ${INFISICAL_PROJECT_ID:-}
    volumes:
      - agent_data:/data/agents
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - clawith_network
      - coolify  # For Traefik proxy access (prevents gateway timeout)

  supergateway:
    image: node:20-alpine
    command: >
      sh -c "npm install -g supergateway &&
             supergateway \
               --stdio 'npx -y @infisical/mcp' \
               --stdio 'npx -y agentmail-mcp' \
               --port 8000 \
               --healthEndpoint /health"
    environment:
      - INFISICAL_HOST_URL=${INFISICAL_HOST_URL}
      - INFISICAL_UNIVERSAL_AUTH_CLIENT_ID=${INFISICAL_UNIVERSAL_AUTH_CLIENT_ID}
      - INFISICAL_UNIVERSAL_AUTH_CLIENT_SECRET=${INFISICAL_UNIVERSAL_AUTH_CLIENT_SECRET}
      - INFISICAL_PROJECT_ID=${INFISICAL_PROJECT_ID}
      - AGENTMAIL_API_KEY=${AGENTMAIL_API_KEY}
    restart: unless-stopped
    networks:
      - clawith_network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-3008}:3000"
    environment:
      VITE_API_URL: http://backend:8000
    depends_on:
      - backend
      - supergateway
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.clawith-http.rule=Host(`agents.moiria.com`)
      - traefik.http.routers.clawith-http.entrypoints=http
      - traefik.http.routers.clawith-http.middlewares=clawith-redirect
      - traefik.http.middlewares.clawith-redirect.redirectscheme.scheme=https
      - traefik.http.middlewares.clawith-redirect.redirectscheme.permanent=true
      - traefik.http.routers.clawith-https.rule=Host(`agents.moiria.com`)
      - traefik.http.routers.clawith-https.entrypoints=https
      - traefik.http.routers.clawith-https.tls=true
      - traefik.http.routers.clawith-https.tls.certresolver=letsencrypt
      - traefik.http.routers.clawith-https.service=clawith
      - traefik.http.services.clawith.loadbalancer.server.port=3000
      - traefik.http.middlewares.clawith-gzip.compress=true
      - traefik.http.routers.clawith-https.middlewares=clawith-gzip
    networks:
      - clawith_network
      - coolify  # For Traefik proxy access (prevents gateway timeout)

volumes:
  pgdata:
  redisdata:
  agent_data:

networks:
  clawith_network:
    driver: bridge
  coolify:
    external: true  # Coolify's global network for Traefik proxy
