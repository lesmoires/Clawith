services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: clawith
      POSTGRES_PASSWORD: 
      POSTGRES_DB: clawith
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clawith"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - clawith_network

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - clawith_network

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    command: ["/bin/bash", "/app/entrypoint.sh"]
    environment:
      DATABASE_URL: postgresql+asyncpg://clawith:@postgres:5432/clawith
      REDIS_URL: redis://redis:6379/0
      AGENT_DATA_DIR: /data/agents
      AGENT_TEMPLATE_DIR: /app/agent_template
      SECRET_KEY: 
      JWT_SECRET_KEY: 
      CORS_ORIGINS: "["*"]"
    volumes:
      - agent_data:/data/agents
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - clawith_network

  frontend:
    build: ./frontend
    ports:
      - "3008:3000"
    environment:
      VITE_API_URL: http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.clawith-http.rule=Host()
      - traefik.http.routers.clawith-http.entrypoints=http
      - traefik.http.routers.clawith-http.middlewares=clawith-redirect
      - traefik.http.middlewares.clawith-redirect.redirectscheme.scheme=https
      - traefik.http.middlewares.clawith-redirect.redirectscheme.permanent=true
      - traefik.http.routers.clawith-https.rule=Host()
      - traefik.http.routers.clawith-https.entrypoints=https
      - traefik.http.routers.clawith-https.tls=true
      - traefik.http.routers.clawith-https.tls.certresolver=letsencrypt
      - traefik.http.routers.clawith-https.service=clawith
      - traefik.http.services.clawith.loadbalancer.server.port=3000
      - traefik.http.middlewares.clawith-gzip.compress=true
      - traefik.http.routers.clawith-https.middlewares=clawith-gzip
    networks:
      - clawith_network

volumes:
  pgdata:
  redisdata:
  agent_data:

networks:
  clawith_network:
    driver: bridge
