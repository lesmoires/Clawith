services:
  mcp-pdf-generator:
    build: .
    container_name: mcp-pdf-generator
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    mem_limit: 1g
    volumes:
      # Shared volume — allows writing PDFs directly to agent workspaces
      - /opt/agents:/agents:rw
    healthcheck:
      test: ["CMD", "node", "-e", "console.log('ok')"]
      interval: 30s
      timeout: 5s
      retries: 3
